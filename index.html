<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BridalOPS Factory Orders</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <h1>Factory Orders</h1>
        <p>
          View and filter orders by factory, sorted by ship date.
        </p>
      </header>

      <section class="filter-panel" aria-label="Factory Filters">
        <div class="filter-panel__title-row">
          <h2>Factories</h2>
          <button id="toggle-all" class="ghost-button" type="button">Select All</button>
        </div>
        <div id="factory-filters" class="chip-list" role="group" aria-label="Factory Options"></div>
      </section>

      <section class="table-panel" aria-label="Factory Orders Table">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>UID</th>
                <th>SKU</th>
                <th>Karat</th>
                <th>Color</th>
                <th>Setting Center Stone</th>
                <th>Factory</th>
                <th>Ship Date</th>
                <th>BPO Date Needed</th>
              </tr>
            </thead>
            <tbody id="orders-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
